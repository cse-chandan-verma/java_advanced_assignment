<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Customer</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f13;
            --surface: #18181f;
            --surface2: #22222c;
            --accent: #e8c97a;
            --accent2: #7a9ee8;
            --text: #f0ede6;
            --muted: #888;
            --border: rgba(255,255,255,0.07);
            --border-focus: rgba(232, 201, 122, 0.5);
            --radius: 12px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        header {
            padding: 40px 60px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            letter-spacing: -0.02em;
        }

        .logo-area span { color: var(--accent); }

        .logo-area p {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 3px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.15s;
        }

        .back-link:hover { color: var(--text); }

        main {
            padding: 50px 60px;
            display: flex;
            justify-content: center;
        }

        .form-side { width: 100%; max-width: 520px; }

        .page-title {
            font-family: 'DM Serif Display', serif;
            font-size: 2.2rem;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 40px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 11px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: none;
        }

        input::placeholder, textarea::placeholder { color: #555; }

        input:focus, textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(232, 201, 122, 0.08);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 26px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #0f0f13;
        }

        .btn-primary:hover {
            background: #f0d78a;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(232, 201, 122, 0.3);
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: rgba(255,255,255,0.2);
        }

        .req { color: var(--accent); margin-left: 2px; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        main { animation: fadeUp 0.4s ease both; }

        @media (max-width: 600px) {
            header, main { padding: 24px 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>CMS<span>·</span>Portal</h1>
        <p>Customer Management System</p>
    </div>
    <a href="/customer" class="back-link">← Back to Customers</a>
</header>

<main>
    <div class="form-side">
        <h2 class="page-title">New Customer</h2>
        <p class="page-subtitle">Fill in the details below to register a new customer.</p>

        <div class="card">
            <form th:action="@{/saveCustomer}" th:object="${customer}" method="post">

                <div class="form-row">
                    <div class="form-group">
                        <label>Customer ID <span class="req">*</span></label>
                        <input type="number" th:field="*{id}" placeholder="101" required />
                    </div>
                    <div class="form-group">
                        <label>Full Name <span class="req">*</span></label>
                        <input type="text" th:field="*{name}" placeholder="John Doe" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address <span class="req">*</span></label>
                        <input type="email" th:field="*{email}" placeholder="john@example.com" required />
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" th:field="*{phoneNumber}" placeholder="+1 234 567 8900" />
                    </div>
                </div>

                <div class="form-group">
                    <label>Residential Address</label>
                    <textarea th:field="*{address}" placeholder="123 Main Street, City, State" rows="3"></textarea>
                </div>

                <div class="divider"></div>

                <div class="form-actions">
                    <a href="/customer" class="btn btn-ghost">Cancel</a>
                    <button type="submit" class="btn btn-primary">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Save Customer
                    </button>
                </div>

            </form>
        </div>
    </div>
</main>

</body>
</html>
