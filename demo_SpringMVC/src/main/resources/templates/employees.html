
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f13;
            --surface: #18181f;
            --surface2: #22222c;
            --accent: #e8c97a;
            --accent2: #7a9ee8;
            --text: #f0ede6;
            --muted: #888;
            --border: rgba(255,255,255,0.07);
            --radius: 12px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        header {
            padding: 40px 60px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            letter-spacing: -0.02em;
        }

        .logo-area span { color: var(--accent); }

        .logo-area p {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 3px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #0f0f13;
        }

        .btn-primary:hover {
            background: #f0d78a;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(232, 201, 122, 0.3);
        }

        main { padding: 50px 60px; }

        .section-header {
            display: flex;
            align-items: baseline;
            gap: 14px;
            margin-bottom: 32px;
        }

        .section-header h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
        }

        .badge {
            background: var(--surface2);
            color: var(--muted);
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead { background: var(--surface2); }

        thead th {
            padding: 14px 24px;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--surface2); }

        tbody td { padding: 16px 24px; font-size: 0.9rem; }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--bg);
            margin-right: 10px;
            vertical-align: middle;
        }

        .name-cell { display: flex; align-items: center; }

        .city-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(122, 158, 232, 0.12);
            color: var(--accent2);
            border: 1px solid rgba(122, 158, 232, 0.2);
        }

        .actions { display: flex; gap: 8px; }

        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.15s;
        }

        .icon-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(232, 201, 122, 0.07);
        }

        .empty-state {
            text-align: center;
            padding: 70px 24px;
            color: var(--muted);
        }

        .empty-state p { font-size: 0.9rem; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        main { animation: fadeUp 0.4s ease both; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>Emp<span>·</span>Roster</h1>
        <p>Employee Directory</p>
    </div>
    <a href="/addEmployee" class="btn btn-primary">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Employee
    </a>
</header>

<main>
    <div class="section-header">
        <h2>All Employees</h2>
        <span class="badge" th:text="${#lists.size(employees)} + ' total'">0 total</span>
    </div>

    <div class="table-container">

        <div class="empty-state" th:if="${#lists.isEmpty(employees)}">
            <p>No employees found. <a href="/addEmployee" style="color:var(--accent);text-decoration:none;">Add the first one →</a></p>
        </div>

        <table th:if="${not #lists.isEmpty(employees)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>City</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="employee : ${employees}">
                    <td style="color: var(--muted);" th:text="${employee.id}">1</td>
                    <td>
                        <div class="name-cell">
                            <span class="avatar" th:text="${#strings.substring(employee.name, 0, 1)}">A</span>
                            <span th:text="${employee.name}">John Doe</span>
                        </div>
                    </td>
                    <td><span class="city-tag" th:text="${employee.city}">New York</span></td>
                    <td>
                        <div class="actions">
                            <a th:href="@{/editEmployee/{id}(id=${employee.id})}" class="icon-btn" title="Edit">✎</a>
                            <a th:href="@{/deleteEmployee/{id}(id=${employee.id})}" class="icon-btn" title="Delete"
                               onclick="return confirm('Delete this employee?')">✕</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</main>

</body>
</html>
